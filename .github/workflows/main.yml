name: XO Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: xobot-group
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # تثبيت المكتبات اللازمة لعمل Sharp و Tesseract
          sudo apt-get install -y tesseract-ocr libtesseract-dev libvips-dev

      - name: Install dependencies
        run: |
          # نستخدم npm ci لأنها أسرع وأكثر أماناً في بيئات البناء
          npm ci

      - name: Run Bot
        env:
          U_MAIL: ${{ secrets.U_MAIL }}
          U_PASS: ${{ secrets.U_PASS }}
        # سنستخدم npm start بدلاً من node index.js
        # وهذا سيعتمد على ما كتبته في package.json (أي تشغيل index.mjs تلقائياً)
        run: npm start
